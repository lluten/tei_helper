# Fly.io app config. Set secrets with: fly secrets set SECRET_KEY=your-key
# Optionally: fly secrets set PRIVACY_CONTACT_EMAIL=you@example.com
#
# App name must be globally unique on Fly.io. If "failed to create app", pick a
# different name (e.g. tei-edit-YOURUSERNAME or tei-edit-university).

app = "tei-edit-lluten"

[build]

[env]
  PORT = "8080"
  TEI_HELPER_WEB = "1"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1
