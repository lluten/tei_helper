<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TEI-edit</title>
    <link href="https://api.fontshare.com/v2/css?f[]=general-sans@500,600,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="page-with-nav">
    {% include '_app_nav.html' %}
    <div class="landing-body">
    <div class="upload-card">
        <div class="logo-area">
            <span class="brand-lg">TEI-edit</span>
        </div>
        <p class="subtitle">Upload documents to start annotating. Choose import type and one or more files (order = page order).</p>
        <p class="subtitle" style="margin-bottom: 12px;">By using this service you agree to our <a href="{{ url_for('privacy') }}">Privacy &amp; terms</a>.</p>

        <form action="{{ url_for('index') }}" method="POST" enctype="multipart/form-data">
            <div class="form-group">
                <label for="import_type">Import type</label>
                <select name="import_type" id="import_type" onchange="updateAccept()">
                    <option value="transkribus">Transkribus PageXML</option>
                    <option value="tei">TEI</option>
                    <option value="image">Image only</option>
                </select>
            </div>
            <div class="file-drop-area" id="drop-area">
                <span class="fake-btn">Choose file(s)</span>
                <span class="file-msg" id="file-msg">or drag and drop here (multiple allowed)</span>
                <input class="file-input" type="file" name="file" id="file-input" accept=".xml" multiple required onchange="updateFileName(this)">
            </div>
            {% if error %}
            <p class="error-msg">{{ error }}</p>
            {% endif %}
            <button type="submit" class="btn-block">Start Project</button>
        </form>
    </div>
    </div>

    <script>
        function updateAccept() {
            const sel = document.getElementById('import_type');
            const inp = document.getElementById('file-input');
            if (sel.value === 'image') {
                inp.accept = 'image/*';
            } else {
                inp.accept = '.xml';
            }
            inp.setAttribute('multiple', 'multiple');
            inp.value = '';
            document.getElementById('file-msg').textContent = 'or drag and drop here (multiple allowed)';
        }
        function updateFileName(input) {
            const msg = document.getElementById('file-msg');
            const area = document.getElementById('drop-area');
            if (input.files && input.files.length > 0) {
                msg.textContent = input.files.length === 1 ? input.files[0].name : input.files.length + ' files selected';
                msg.style.color = "var(--text-color)";
                area.classList.add('is-active');
            } else {
                msg.textContent = document.getElementById('import_type').value === 'image' ? 'or drag and drop here' : 'or drag and drop here (multiple allowed)';
                area.classList.remove('is-active');
            }
        }
    </script>
</body>
</html>
